name: Label agent PRs

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    name: Apply agent label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check for agent co-authorship
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          has_agent=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/commits \
            --jq '[.[].commit.message | test("(^|\n)Co-Authored-By: (Claude|Codex|GitHub Copilot|Copilot|Devin|Aider|Cursor)"; "i")] | any')
          echo "has_agent=$has_agent" >> "$GITHUB_OUTPUT"

      - name: Apply agent label
        if: steps.check.outputs.has_agent == 'true'
        run: gh pr edit ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --add-label "👾 agent"
        env:
          GH_TOKEN: ${{ github.token }}
