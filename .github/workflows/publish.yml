name: Publish

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: false

jobs:
  detect-version-changes:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    outputs:
      any_changed: ${{ steps.versions.outputs.any_changed }}
      core_changed: ${{ steps.versions.outputs.core_changed }}
      dsl_changed: ${{ steps.versions.outputs.dsl_changed }}
      effect_changed: ${{ steps.versions.outputs.effect_changed }}
      json_changed: ${{ steps.versions.outputs.json_changed }}
      reads_changed: ${{ steps.versions.outputs.reads_changed }}
      write_changed: ${{ steps.versions.outputs.write_changed }}
      devtools_changed: ${{ steps.versions.outputs.devtools_changed }}
      store_changed: ${{ steps.versions.outputs.store_changed }}
      signals_changed: ${{ steps.versions.outputs.signals_changed }}
      react_changed: ${{ steps.versions.outputs.react_changed }}
      redux_changed: ${{ steps.versions.outputs.redux_changed }}
      pinia_changed: ${{ steps.versions.outputs.pinia_changed }}
      tanstack_store_changed: ${{ steps.versions.outputs.tanstack_store_changed }}
      vuex_changed: ${{ steps.versions.outputs.vuex_changed }}
      zustand_changed: ${{ steps.versions.outputs.zustand_changed }}
      zod_changed: ${{ steps.versions.outputs.zod_changed }}
      testing_changed: ${{ steps.versions.outputs.testing_changed }}
      eslint_plugin_changed: ${{ steps.versions.outputs.eslint_plugin_changed }}
      solid_changed: ${{ steps.versions.outputs.solid_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Detect package version changes
        id: versions
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          MANUAL_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execFileSync } = require('node:child_process');
          const fs = require('node:fs');
          const path = require('node:path');

          const packages = ['core', 'dsl', 'effect', 'json', 'reads', 'write', 'devtools', 'store', 'signals', 'react', 'redux', 'pinia', 'tanstack-store', 'vuex', 'zustand', 'zod', 'testing', 'eslint-plugin', 'solid'];

          // Manual dispatch: mark everything changed so all packages are published.
          if (process.env.MANUAL_DISPATCH === 'true') {
            for (const pkg of packages) {
              console.log(`${pkg.replace(/-/g, '_')}_changed=true`);
            }
            console.log('any_changed=true');
            process.exit(0);
          }

          const head = process.env.HEAD_SHA;
          const before = (() => {
            if (!head) {
              return null;
            }

            try {
              return execFileSync(
                'git',
                ['rev-parse', `${head}^1`],
                { encoding: 'utf8' }
              ).trim();
            } catch {
              return null;
            }
          })();
          const isZeroSha = !before || /^0+$/.test(before);

          const readCurrentVersion = (pkg) => {
            const packageJson = path.join('packages', pkg, 'package.json');
            return JSON.parse(fs.readFileSync(packageJson, 'utf8')).version;
          };

          const readPreviousVersion = (pkg) => {
            if (isZeroSha) {
              return null;
            }

            try {
              const packageJson = execFileSync(
                'git',
                ['show', `${before}:packages/${pkg}/package.json`],
                { encoding: 'utf8' }
              );
              return JSON.parse(packageJson).version;
            } catch {
              return null;
            }
          };

          let anyChanged = false;

          for (const pkg of packages) {
            const current = readCurrentVersion(pkg);
            const previous = readPreviousVersion(pkg);
            const changed = previous === null || current !== previous;
            const outputKey = pkg.replace(/-/g, '_');

            if (changed) {
              anyChanged = true;
            }

            console.log(`${outputKey}_changed=${changed}`);
          }

          console.log(`any_changed=${anyChanged}`);
          NODE

  publish:
    needs: [detect-version-changes]
    if: needs.detect-version-changes.outputs.any_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn turbo run build

      - name: Publish @umpire/core
        if: needs.detect-version-changes.outputs.core_changed == 'true'
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="latest"
          if echo "$VERSION" | grep -q "-"; then TAG="alpha"; fi
          PKG=$(node -p "require('./package.json').name")
          if npm show "$PKG@$VERSION" version > /dev/null 2>&1; then
            echo "$PKG@$VERSION already published, skipping"
          else
            yarn pack -o package.tgz
            npm publish package.tgz --provenance --access public --tag "$TAG"
          fi

      - name: Publish @umpire/dsl
        if: needs.detect-version-changes.outputs.dsl_changed == 'true'
